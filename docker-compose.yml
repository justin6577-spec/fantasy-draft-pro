services:
  postgres:
    image: postgres:16-alpine
    container_name: fantasy-draft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fantasy_draft
    ports:
      - '5432:5432'
    volumes:
      - fantasy-draft-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fantasy-draft-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - fantasy-draft-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fantasy-draft-postgres-data:
  fantasy-draft-redis-data:
